<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAILOR Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%230d9488' font-size='11' font-weight='700' font-family='sans-serif'>[AI]</text></svg>" />
  <script src="/dashboard/vendor/react.min.js"></script>
  <script src="/dashboard/vendor/react-dom.min.js"></script>
  <script src="/dashboard/vendor/tailwind.js"></script>
  <!-- Markdown rendering for the Chat tab. CDN — vendor locally if offline-first needed. -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <!-- CodeMirror 5 + YAML mode for the config editor's "Advanced (YAML)" view.
       CM5 because: single-file, no build step, rock-solid. CM6 would need
       importmaps + type="module" gymnastics that conflict with the rest of
       this file's top-level scripts. See the commit body for the trade-off. -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
  <!-- Browser YAML parser: needed for client-side syntax checks + the
       form↔YAML view sync. Every keystroke re-parses; if the result
       is a dict, we update the shared draft state. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a3a3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #0d9488; }
    /* Polish: smooth transitions globally */
    *, *::before, *::after { transition-property: color, background-color, border-color, box-shadow, opacity; transition-duration: 200ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
    /* Glow keyframe for status dots */
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 8px rgba(52,211,153,0.5); } 50% { box-shadow: 0 0 14px rgba(52,211,153,0.7); } }
    .glow-pulse { animation: glow-pulse 2.5s ease-in-out infinite; }
    /* Landing-style polish */
    .tile-glow:hover { box-shadow: 0 0 25px rgba(20,184,166,0.06), 0 4px 20px rgba(0,0,0,0.3) !important; }
    .frosted-nav { backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-bottom: 1px solid rgba(20,184,166,0.08) !important; }
    .nav-pill-active { background: linear-gradient(135deg, rgba(20,184,166,0.12), rgba(20,184,166,0.06)) !important; box-shadow: 0 0 16px rgba(20,184,166,0.1); }
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-in 0.4s ease-out; }
    /* Teal focus ring for inputs */
    input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(20,184,166,0.15) !important; }
    /* Subtle teal border on footer */
    .footer-teal { border-color: rgba(20,184,166,0.08) !important; }
    /* Chat tab markdown rendering */
    .chat-prose p { margin: 0.5em 0; }
    .chat-prose p:first-child { margin-top: 0; }
    .chat-prose p:last-child { margin-bottom: 0; }
    .chat-prose code { background: rgba(255,255,255,0.06); padding: 0.1em 0.35em; border-radius: 4px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.9em; }
    .chat-prose pre { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 0.75em 1em; margin: 0.75em 0; overflow-x: auto; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.9em; }
    .chat-prose pre code { background: transparent; padding: 0; }
    .chat-prose ul, .chat-prose ol { padding-left: 1.5em; margin: 0.5em 0; }
    .chat-prose li { margin: 0.2em 0; }
    .chat-prose a { color: #5eead4; text-decoration: underline; }
    .chat-prose strong { color: #fff; }
    .chat-prose blockquote { border-left: 3px solid #134e4a; padding-left: 0.75em; margin: 0.75em 0; color: #a1a1aa; }
    /* Composer: suppress the global textarea:focus teal ring (which bleeds as a
       vertical stripe next to the Send button because of the flex gap). Move
       the focus ring onto the whole container via :focus-within instead. */
    .chat-composer textarea { box-shadow: none !important; }
    .chat-composer textarea:focus { box-shadow: none !important; outline: none !important; }
    .chat-composer:focus-within { box-shadow: 0 0 0 3px rgba(20,184,166,0.15); border-color: rgba(20,184,166,0.6); }

    /* ── Chat shell responsive sizing ────────────────────────────
       Desktop: subtract the full dashboard chrome (header + nav + footer + padding).
       Mobile: smaller chrome, no footer takes the full visible area; 100dvh gives
       us the *dynamic* viewport height so the iOS URL bar collapsing/expanding
       doesn't cause layout jumps. Fall back to 100vh on engines without dvh. */
    .chat-shell { height: calc(100vh - 240px); min-height: 520px; }
    @supports (height: 100dvh) {
      .chat-shell { height: calc(100dvh - 240px); }
    }
    @media (max-width: 767px) {
      .chat-shell {
        height: calc(100vh - 180px);
        min-height: 420px;
      }
      @supports (height: 100dvh) {
        .chat-shell { height: calc(100dvh - 180px); }
      }
      /* iOS auto-zooms on input focus when font-size is < 16px. Force 16px on
         the composer textarea (scoped to mobile only so desktop stays compact). */
      .chat-composer textarea { font-size: 16px !important; }
    }
    /* Respect the home-indicator / notch on phones — scope to the chat composer
       so it doesn't affect other dashboard surfaces. */
    .chat-composer-wrap { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Chat tab component. Exposes window.TailorChat.Tab. -->
  <script src="/dashboard/chat.jsx"></script>
  <script>
    const { useState, useEffect, createContext, useContext, useCallback } = React;

    // ── API ──
    const API_BASE = window.location.origin;
    const API_TOKEN = new URLSearchParams(window.location.search).get("token") || "";

    async function apiFetch(endpoint) {
      const sep = endpoint.includes("?") ? "&" : "?";
      const url = `${API_BASE}/api/dashboard/${endpoint}${API_TOKEN ? `${sep}token=${API_TOKEN}` : ""}`;
      try {
        const r = await fetch(url, { credentials: "include" });
        if (!r.ok) {
          if (r.status === 401) window.__tailorUnauth = true;
          return null;
        }
        return await r.json();
      } catch { return null; }
    }

    // Normalized call against the config endpoints. All of them follow
    //   success → {ok: true, ...payload}           HTTP 200
    //   error   → {ok: false, error, status}        HTTP <status>
    // so this helper returns one consistent shape regardless of which one
    // you hit: {ok: true, data} or {ok: false, error, status}.
    async function apiCall(path, { method = "GET", body = null } = {}) {
      try {
        const opts = { method, credentials: "include", headers: {} };
        if (body !== null) {
          opts.headers["Content-Type"] = "application/json";
          opts.body = JSON.stringify(body);
        }
        const sep = path.includes("?") ? "&" : "?";
        const url = `${API_BASE}${path}${API_TOKEN ? `${sep}token=${API_TOKEN}` : ""}`;
        const r = await fetch(url, opts);
        let data = null;
        try { data = await r.json(); } catch {}
        if (data && data.ok === false) {
          return { ok: false, error: data.error || `HTTP ${r.status}`, status: data.status || r.status };
        }
        if (!r.ok) {
          return { ok: false, error: `HTTP ${r.status}`, status: r.status };
        }
        return { ok: true, data: data || {} };
      } catch (e) {
        return { ok: false, error: (e && e.message) || "Connection failed", status: 0 };
      }
    }

    // ── Theme ──
    const ThemeContext = createContext();
    const useTheme = () => useContext(ThemeContext);

    const themes = {
      dark: {
        bg: "linear-gradient(135deg, #050608 0%, #070a0f 50%, #050608 100%)",
        headerBg: "rgba(5,6,8,0.65)",
        tile: "bg-gradient-to-b from-zinc-900/50 to-zinc-950/60 border-zinc-800/40 hover:border-teal-500/30 tile-glow",
        text: "text-zinc-100", textMuted: "text-zinc-500", textFaint: "text-zinc-600", textLabel: "text-zinc-400",
        border: "border-zinc-800/40", borderLight: "border-zinc-800/50", rowAlt: "bg-zinc-900/40",
        tag: "bg-zinc-800 text-zinc-300 border-zinc-700",
        tagAccent: "bg-teal-900/30 text-teal-300 border-teal-600/40",
        tagMuted: "bg-zinc-900 text-zinc-500 border-zinc-800",
        barBg: "bg-zinc-800", footerText: "text-zinc-600",
        navActive: "text-teal-400 nav-pill-active",
        navInactive: "text-zinc-500 hover:text-zinc-300 hover:bg-white/[0.04]",
        accent: "text-teal-400", statusOnline: "text-emerald-400", mono: "text-zinc-200",
        skeleton: "bg-zinc-800 animate-pulse",
        input: "bg-zinc-900 border-zinc-700 text-zinc-100 placeholder-zinc-600",
        infoBox: "bg-zinc-800/50 text-zinc-400",
        tipBox: "bg-teal-900/20 text-teal-300 border border-teal-800/30",
        warnBox: "bg-amber-900/15 text-amber-300 border border-amber-800/30",
      },
      light: {
        bg: "linear-gradient(180deg, #f9fafb 0%, #f0f2f5 100%)",
        headerBg: "rgba(249,250,251,0.8)",
        tile: "bg-white/80 border-zinc-200/80 hover:border-teal-400/25 hover:shadow-[0_0_15px_rgba(20,184,166,0.04)] shadow-sm",
        text: "text-zinc-900", textMuted: "text-zinc-500", textFaint: "text-zinc-400", textLabel: "text-zinc-600",
        border: "border-zinc-200", borderLight: "border-zinc-100", rowAlt: "bg-zinc-50",
        tag: "bg-zinc-100 text-zinc-700 border-zinc-200",
        tagAccent: "bg-teal-50 text-teal-700 border-teal-200",
        tagMuted: "bg-zinc-50 text-zinc-400 border-zinc-200",
        barBg: "bg-zinc-200", footerText: "text-zinc-400",
        navActive: "bg-teal-50 text-teal-600",
        navInactive: "text-zinc-400 hover:text-zinc-600 hover:bg-zinc-100",
        accent: "text-teal-600", statusOnline: "text-emerald-600", mono: "text-zinc-700",
        skeleton: "bg-zinc-200 animate-pulse",
        input: "bg-zinc-50 border-zinc-200 text-zinc-900 placeholder-zinc-400",
        infoBox: "bg-zinc-100 text-zinc-600",
        tipBox: "bg-teal-50 text-teal-700 border border-teal-200",
        warnBox: "bg-amber-50 text-amber-700 border border-amber-200",
      },
    };

    // ── Shared ──
    const cl = (...c) => c.filter(Boolean).join(" ");

    const statusStyle = {
      running: { bg: "bg-emerald-500/15", text: "text-emerald-400", dot: "bg-emerald-400", glow: "shadow-[0_0_12px_rgba(52,211,153,0.5)]" },
      ok: { bg: "bg-emerald-500/15", text: "text-emerald-400" },
      warning: { bg: "bg-amber-500/15", text: "text-amber-400", dot: "bg-amber-400", glow: "shadow-[0_0_10px_rgba(251,191,36,0.4)]" },
      error: { bg: "bg-red-500/15", text: "text-red-400", dot: "bg-red-400" },
      stopped: { bg: "bg-red-500/15", text: "text-red-400", dot: "bg-red-400", glow: "shadow-[0_0_10px_rgba(248,113,113,0.4)]" },
    };

    const ICONS = { mcp: "\u{1F9E0}", telegram: "\u{1F4AC}", ollama: "\u{1F52E}", tunnel: "\u{1F310}", "vscode-tunnel": "\u2328\uFE0F" };
    const svcIcon = (id) => ICONS[id.split(".").pop()] || "\u2699";

    const Tile = ({ children, className = "" }) => {
      const t = useTheme();
      return React.createElement("div", { className: cl("rounded-2xl border p-5 transition-all duration-300 fade-in", t.tile, className) }, children);
    };

    const Tag = ({ children, variant = "default" }) => {
      const t = useTheme();
      const v = { default: t.tag, accent: t.tagAccent, muted: t.tagMuted };
      return React.createElement("span", { className: cl("inline-block px-2.5 py-1 text-sm rounded-lg border", v[variant]) }, children);
    };

    const BigNum = ({ value, label, unit = "", accent = false }) => {
      const t = useTheme();
      const display = value === null || value === undefined ? "\u2014" : typeof value === "number" ? value.toLocaleString() : value;
      return React.createElement("div", null,
        React.createElement("div", { className: cl("text-4xl font-extrabold tracking-tight drop-shadow-sm", accent ? t.accent : t.text) },
          display,
          unit && React.createElement("span", { className: cl("text-lg font-normal ml-1", t.textMuted) }, unit)
        ),
        React.createElement("div", { className: cl("text-sm mt-1 uppercase tracking-widest", t.textMuted) }, label)
      );
    };

    const ProgressBar = ({ value, max, color = "bg-teal-500", height = "h-2.5" }) => {
      const t = useTheme();
      const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
      return React.createElement("div", { className: cl("w-full rounded-full overflow-hidden", t.barBg, height) },
        React.createElement("div", { className: cl("rounded-full transition-all duration-700", height, color), style: { width: `${pct}%`, boxShadow: color.includes("teal") ? "0 0 14px rgba(20,184,166,0.35), 0 0 4px rgba(20,184,166,0.2)" : "none" } })
      );
    };

    const Skeleton = ({ className = "h-8 w-24" }) => {
      const t = useTheme();
      return React.createElement("div", { className: cl("rounded-lg", t.skeleton, className) });
    };

    const TABS = [
      { id: "home", label: "Home", icon: "\u2B21" },
      { id: "chat", label: "Chat", icon: "\u25B6" },
      { id: "kb", label: "Knowledge Base", icon: "\u25C6" },
      { id: "pipeline", label: "Pipeline", icon: "\u25B8" },
      { id: "config", label: "Configuration", icon: "\u2699" },
      { id: "secrets", label: "API Keys", icon: "\u26BF" },
      { id: "profile", label: "Profile", icon: "\u25CE" },
    ];

    // ── Form Components (shared by Wizard and Config Editor) ──
    const WInput = ({ label, value, onChange, type = "text", placeholder = "", mono = false, helpText = "", mode = "dark" }) => {
      const t = themes[mode];
      return React.createElement("div", { className: "mb-4" },
        React.createElement("label", { className: cl("text-sm font-medium block mb-1.5", t.textLabel) }, label),
        React.createElement("input", {
          type, value: value || "", placeholder,
          onChange: (e) => onChange(e.target.value),
          className: cl("w-full px-4 py-3 rounded-xl border text-sm outline-none transition-all",
            "focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500",
            mono ? "font-mono" : "", t.input),
        }),
        helpText && React.createElement("p", { className: cl("text-xs mt-1", t.textFaint) }, helpText)
      );
    };

    const WTextArea = ({ label, value, onChange, placeholder = "", rows = 3, helpText = "", mode = "dark" }) => {
      const t = themes[mode];
      return React.createElement("div", { className: "mb-4" },
        React.createElement("label", { className: cl("text-sm font-medium block mb-1.5", t.textLabel) }, label),
        React.createElement("textarea", {
          value: value || "", placeholder, rows,
          onChange: (e) => onChange(e.target.value),
          className: cl("w-full px-4 py-3 rounded-xl border text-sm outline-none transition-all resize-none",
            "focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500", t.input),
        }),
        helpText && React.createElement("p", { className: cl("text-xs mt-1", t.textFaint) }, helpText)
      );
    };

    const WSelect = ({ label, value, onChange, options, helpText = "", mode = "dark" }) => {
      const t = themes[mode];
      return React.createElement("div", { className: "mb-4" },
        React.createElement("label", { className: cl("text-sm font-medium block mb-1.5", t.textLabel) }, label),
        React.createElement("select", {
          value: value || "",
          onChange: (e) => onChange(e.target.value),
          className: cl("w-full px-4 py-3 rounded-xl border text-sm outline-none transition-all",
            "focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500", t.input),
        }, options.map(o => React.createElement("option", { key: o.value, value: o.value }, o.label))),
        helpText && React.createElement("p", { className: cl("text-xs mt-1", t.textFaint) }, helpText)
      );
    };

    // ── Model Catalogs ──
    const LLM_MODELS = {
      anthropic: [
        { value: "claude-haiku-4-5-20251001", label: "Claude Haiku 4.5 (fast, cheap)" },
        { value: "claude-sonnet-4-20250514", label: "Claude Sonnet 4 (balanced)" },
      ],
      openai: [
        { value: "gpt-4o-mini", label: "GPT-4o Mini (fast, cheap)" },
        { value: "gpt-4o", label: "GPT-4o (balanced)" },
      ],
      google: [
        { value: "gemini-2.0-flash", label: "Gemini 2.0 Flash (fast)" },
        { value: "gemini-2.5-pro-preview-05-06", label: "Gemini 2.5 Pro (balanced)" },
      ],
      ollama: [
        { value: "qwen2.5:7b", label: "Qwen 2.5 7B (local)" },
        { value: "llama3.1:8b", label: "Llama 3.1 8B (local)" },
        { value: "mistral:7b", label: "Mistral 7B (local)" },
      ],
      deepseek: [
        { value: "deepseek-chat", label: "DeepSeek V3 (general)" },
        { value: "deepseek-reasoner", label: "DeepSeek R1 (reasoning)" },
      ],
    };

    const EMBED_MODELS = {
      ollama: [
        { value: "nomic-embed-text", label: "Nomic Embed Text (768d, local)" },
        { value: "mxbai-embed-large", label: "mxbai Embed Large (1024d, local)" },
      ],
      openai: [
        { value: "text-embedding-3-small", label: "text-embedding-3-small (1536d)" },
        { value: "text-embedding-3-large", label: "text-embedding-3-large (3072d)" },
      ],
      google: [
        { value: "gemini-embedding-2-preview", label: "Gemini Embedding 2 (768d)" },
      ],
    };

    const EMBED_DIMS = {
      "nomic-embed-text": 768, "mxbai-embed-large": 1024,
      "text-embedding-3-small": 1536, "text-embedding-3-large": 3072,
      "gemini-embedding-2-preview": 768,
    };

    // ── Setup Wizard ──
    const WIZARD_STEPS = [
      { id: "welcome", label: "Welcome", icon: "\u{1F44B}", desc: "Tell us about yourself" },
      { id: "llm", label: "LLM", icon: "\u{1F9E0}", desc: "AI model configuration" },
      { id: "embedding", label: "Embedding", icon: "\u{1F52E}", desc: "Vector embedding model" },
      { id: "enrichment", label: "Enrichment", icon: "\u{1F52C}", desc: "Nightly pipeline backends", optional: true },
      { id: "telegram", label: "Telegram", icon: "\u{1F4AC}", desc: "Bot integration", optional: true },
      { id: "email", label: "Email", icon: "\u{1F4E7}", desc: "Email sync", optional: true },
      { id: "storage", label: "Storage", icon: "\u2601\uFE0F", desc: "Cloud storage sync", optional: true },
      { id: "remote", label: "Remote", icon: "\u{1F310}", desc: "Remote access setup", optional: true },
      { id: "import", label: "Import", icon: "\u{1F4E5}", desc: "Import conversations", optional: true },
      { id: "review", label: "Review", icon: "\u2705", desc: "Review & save" },
    ];

    function SetupWizard({ onComplete, mode }) {
      const [step, setStep] = useState(0);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState("");
      const [cfg, setCfg] = useState({
        user: { name: "", bio: "", language: "en" },
        branding: { app_name: "TAILOR" },
        llm: { provider: "anthropic", model: "claude-haiku-4-5-20251001", api_key: "", tool_use: true, max_tokens: 1000, temperature: 0.3 },
        embedding: { provider: "ollama", model: "nomic-embed-text", dimensions: 768 },
        telegram: { bot_token: "", chat_id: "", poll_timeout: 30 },
        email: { provider: "", address: "", credentials: {} },
        cloud_sync: [],
        remote_access: { provider: "none" },
        ingest: { conversations: [] },
        classifier: { provider: "ollama", model: "qwen2.5:7b", temperature: 0.3, max_tokens: 400 },
        kb: { collection: "tailor_conversations" },
        persona: { name: "Tailor", system_prompt: "You are Tailor, a personal AI assistant." },
        sessions: { timeout_minutes: 10, max_history: 20, auto_capture: true },
        enrichment: {
          fact_extraction: { backends: [{ provider: "google", model: "gemini-2.5-flash" }] },
          fact_supersession: { backends: [{ provider: "anthropic", model: "claude-haiku-4-5-20251001" }] },
          fact_derivation: { backends: [{ provider: "anthropic", model: "claude-haiku-4-5-20251001" }] },
          entity_extraction: { backends: [{ provider: "anthropic", model: "claude-haiku-4-5-20251001" }] },
          doc_enrichment: { backends: [{ provider: "anthropic", model: "claude-haiku-4-5-20251001" }] },
          summaries: { backends: [{ provider: "anthropic", model: "claude-haiku-4-5-20251001" }] },
        },
      });

      const t = themes[mode];
      const current = WIZARD_STEPS[step];
      const isFirst = step === 0;
      const isLast = step === WIZARD_STEPS.length - 1;

      const updateCfg = (section, updates) => {
        setCfg(prev => ({ ...prev, [section]: { ...(prev[section] || {}), ...updates } }));
      };

      const canProceed = () => {
        switch (current.id) {

      //                always update draft, so YAML always rebuilds fresh.
      //   YAML → Form: keystrokes → debounced parse → if valid, replace
      //                draft. Switch to form at any time; form renders
      //                from whatever draft currently holds.
      //   Switch out of YAML with unparseable text: confirm, discard
      //                YAML changes (revert yamlText from current draft).
      const [viewMode, setViewMode] = useState("form");
      const [yamlText, setYamlText] = useState("");
      const [yamlParseError, setYamlParseError] = useState("");       // syntax
      const [yamlValidateStatus, setYamlValidateStatus] = useState("idle");  // idle|validating|ok|error
      const [yamlValidateError, setYamlValidateError] = useState(""); // server-side
      // Revision counter so the debounced validator knows whether the
      // response it's about to apply is still the freshest request.
      const yamlSeqRef = React.useRef(0);

      // Force-restart modal state.
      const [restartOpen, setRestartOpen] = useState(false);
      const [restartPhase, setRestartPhase] = useState("idle"); // idle|sending|waiting|reconnected|failed
      const [restartCountdown, setRestartCountdown] = useState(0);

      // ── Dynamic provider→models catalog ─────────────────────
      // Backs the Model dropdowns in the Chat-interface row editor and the
      // Default-LLM form. Hits GET /api/chat/models?provider=... on demand,
      // then memoizes per provider for the rest of the session so switching
      // Provider back and forth never re-fetches. Cleared only on remount.
      //
      // Per-provider entry shape:
      //   { status: "loading" | "ok" | "error", models?: [...], error?: "..." }
      //
      // "ollama" is NOT served by this endpoint (no cloud /models API). The
      // two forms fall back to the hardcoded LLM_MODELS list for Ollama
      // (and for any provider whose fetch failed) via a free-text input —
      // that's the escape hatch the spec calls for.
      const [modelCatalog, setModelCatalog] = useState({});
      const DYNAMIC_MODEL_PROVIDERS = React.useMemo(
        () => new Set(["anthropic", "openai", "google", "deepseek"]),
        [],
      );
      // Synchronous in-flight / completed tracking via a ref. We can't rely
      // on reading `modelCatalog` from the closure (stale across renders)
      // or on side-effects inside the setModelCatalog updater (React batches
      // updaters — they run during the next render, *after* the lines that
      // follow setModelCatalog have already executed). The ref is the only
      // thing that's both shared across renders AND mutable synchronously,
      // so it's what we use to decide whether to fire the HTTP call.
      const fetchStateRef = React.useRef({}); // provider -> "loading" | "ok"
      const fetchProviderModels = useCallback(async (provider) => {
        if (!provider || !DYNAMIC_MODEL_PROVIDERS.has(provider)) return;
        const state = fetchStateRef.current[provider];
        if (state === "loading" || state === "ok") return;
        fetchStateRef.current[provider] = "loading";
        setModelCatalog(prev => ({ ...prev, [provider]: { status: "loading" } }));
        const r = await apiCall(`/api/chat/models?provider=${encodeURIComponent(provider)}`);
        if (r.ok) {
          fetchStateRef.current[provider] = "ok";
          setModelCatalog(prev => ({ ...prev, [provider]: { status: "ok", models: r.data.models || [] } }));
        } else {
          // Leave the ref unset so a subsequent call retries (e.g. user adds an API key
          // in the Secrets panel and flips the Provider back to retry).
          delete fetchStateRef.current[provider];
          setModelCatalog(prev => ({ ...prev, [provider]: { status: "error", error: r.error || "Fetch failed" } }));
        }
      }, [DYNAMIC_MODEL_PROVIDERS]);

      // Prefetch model lists for every provider referenced by the current
      // draft — llm.provider and each chat_interface.available_providers
      // row — so existing rows render a populated dropdown without waiting
      // for the user to touch the Provider select. fetchProviderModels is
      // idempotent (ref-backed), so firing it on every draft change is
      // cheap: it no-ops after the first call for each provider.
      useEffect(() => {
        if (!draft) return;
        const providers = new Set();
        const lp = draft.llm && draft.llm.provider;
        if (lp) providers.add(lp);
        const ap = (draft.chat_interface && draft.chat_interface.available_providers) || [];
        for (const r of ap) {
          if (r && r.provider) providers.add(r.provider);
        }
        providers.forEach(p => { fetchProviderModels(p); });
      }, [draft, fetchProviderModels]);

      // Fetch current config. On mount (silent=false) we show the
      // loading skeleton; on re-fetch after an external change (restore
      // from backup, which bumps refreshSignal), we stay silent to
      // avoid blinking the whole editor for half a second when the
      // restore toast is already telling the user what happened.
      // Returns the loaded cfg so callers can chain on the fresh state
      // without racing React's batched state updates.
      const reload = useCallback(async ({ silent = false } = {}) => {
        if (!silent) setLoading(true);
        const r = await apiCall("/api/dashboard/config/current");
        let loadedCfg = null;
        if (r.ok) {
          const cfg = r.data.config || {};
          // Seed empty editable sections so form bindings have something
          // to write into without needing to guard every nested access.
          for (const key of RUNTIME_EDITABLE_SECTIONS) {
            if (!cfg[key]) cfg[key] = {};
          }
          loadedCfg = cloneConfigForEdit(cfg);
          setLoaded(loadedCfg);
          setDraft(cloneConfigForEdit(cfg));
          setLoadError("");
        } else {
          setLoadError(r.error);
        }
        if (!silent) setLoading(false);
        return loadedCfg;
      }, []);

      useEffect(() => { reload(); }, [reload]);

      // External refresh trigger: parent bumps `refreshSignal` (e.g.
      // after a restore from backup) and we re-fetch /current, then
      // blow away transient editor state that would otherwise mask or
      // contradict the newly loaded config — stale YAML buffer, field
      // errors pointing at the now-replaced draft, leftover server
      // errors from a prior save, the "Saved: …" toast from a prior
      // successful save. Skip the very first run: the mount effect
      // above already handles initial load.
      const refreshSignalSeenRef = React.useRef(0);
      useEffect(() => {
        if (refreshSignal === refreshSignalSeenRef.current) return;
        refreshSignalSeenRef.current = refreshSignal;
        if (refreshSignal === 0) return;  // initial value; nothing to do
        (async () => {
          const newCfg = await reload({ silent: true });
          if (!newCfg) return;
          // If user is currently in the YAML view, the textarea buffer
          // shows the PRE-restore YAML. Regenerate from the freshly
          // loaded draft so Form and YAML both reflect the restore.
          // If user is in Form view we just blank the buffer so the
          // next switch to YAML regenerates from the live draft.
          setYamlText(viewMode === "yaml" ? serializeDraftToYaml(newCfg) : "");
          setYamlParseError("");
          setYamlValidateStatus("idle");
          setYamlValidateError("");
          setFieldErrors({});
          setServerError("");
          setSaveMsg("");
        })();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [refreshSignal]);

      const dirty = !!(loaded && draft && JSON.stringify(draft) !== JSON.stringify(loaded));

      // Notify parent so it can intercept tab changes.
      useEffect(() => { if (onDirtyChange) onDirtyChange(dirty); }, [dirty, onDirtyChange]);

      // Browser-level "you have unsaved changes" dialog.
      useEffect(() => {
        if (!dirty) return;
        const handler = (e) => { e.preventDefault(); e.returnValue = ""; };
        window.addEventListener("beforeunload", handler);
        return () => window.removeEventListener("beforeunload", handler);
      }, [dirty]);

      const patch = (section, updates) =>
        setDraft(d => ({ ...d, [section]: { ...(d[section] || {}), ...updates } }));

      const toggle = (key) => setExpanded(s => ({ ...s, [key]: !s[key] }));

      // ── YAML ↔ draft sync ────────────────────────────────────
      //
      // serializeDraftToYaml runs on every Form → YAML switch, and on
      // reload. We dump via js-yaml with flow styling off and insertion
      // order preserved so the user sees a shape close to what's on disk.
      const serializeDraftToYaml = React.useCallback((d) => {
        if (!d) return "";
        try {
          return window.jsyaml ? window.jsyaml.dump(d, { lineWidth: 120, noRefs: true, sortKeys: false }) : JSON.stringify(d, null, 2);
        } catch (e) {
          return `# YAML serialization failed: ${e.message}\n`;
        }
      }, []);

      // parseYamlText: client-only. Returns {ok, data} or {ok:false, err}.
      const parseYamlText = React.useCallback((text) => {
        if (!window.jsyaml) return { ok: false, err: "YAML parser not loaded" };
        try {
          const parsed = window.jsyaml.load(text || "");
          if (parsed === null || parsed === undefined) {
            return { ok: false, err: "Empty document" };
          }
          if (typeof parsed !== "object" || Array.isArray(parsed)) {
            return { ok: false, err: "YAML root must be a mapping (key: value pairs)" };
          }
          return { ok: true, data: parsed };
        } catch (e) {
          // js-yaml gives us line numbers in e.mark.line (0-indexed).
          const where = e.mark ? ` (line ${e.mark.line + 1})` : "";
          return { ok: false, err: `${e.reason || e.message}${where}` };
        }
      }, []);

      // On entry to YAML view, regenerate the buffer from current draft.
      // We do NOT regenerate on every draft change — that would clobber
      // user edits mid-typing. Only on explicit switch.
      useEffect(() => {
        if (viewMode === "yaml" && draft) {
          setYamlText(prev => {
            // Only overwrite if buffer is stale (e.g. just entered YAML view).
            // The marker is: prev === "" after switch, or the parse of prev
            // no longer matches draft (meaning Form changed something while
            // we weren't looking).
            if (prev === "") return serializeDraftToYaml(draft);
            const parsed = parseYamlText(prev);
            if (parsed.ok && JSON.stringify(parsed.data) === JSON.stringify(draft)) {
              return prev;  // buffer still matches draft — keep cursor
            }
            return serializeDraftToYaml(draft);
          });
          // Reset validate status on view entry.
          setYamlValidateStatus("idle");
          setYamlValidateError("");
          setYamlParseError("");
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [viewMode]);

      // Keystroke path: parse locally, if good update draft, kick off
      // server /validate with a 500ms debounce.
      //
      // Why 500ms: fast enough to feel responsive, slow enough that a
      // word's worth of typing doesn't trigger multiple requests. Too
      // short (e.g. 200ms) makes devtools look like a DDoS; too long
      // (e.g. 1s) and the user has already forgotten what they typed
      // when the feedback arrives. 500ms is the search-as-you-type
      // industry default for the same reason.
      useEffect(() => {
        if (viewMode !== "yaml") return;
        const parsed = parseYamlText(yamlText);
        if (!parsed.ok) {
          setYamlParseError(parsed.err);
          setYamlValidateStatus("idle");
          return;
        }
        setYamlParseError("");
        // Update the shared draft — this is what makes Form view see the
        // YAML edits when the user switches back.
        setDraft(parsed.data);

        // Debounced server-side /validate. seq guards against a late
        // response overwriting a later one.
        const mySeq = ++yamlSeqRef.current;
        setYamlValidateStatus("validating");
        const timer = setTimeout(async () => {
          const r = await apiCall("/api/dashboard/config/validate", {
            method: "POST", body: { yaml: yamlText },
          });
          if (mySeq !== yamlSeqRef.current) return;  // stale
          if (r.ok) {
            setYamlValidateStatus("ok");
            setYamlValidateError("");
          } else {
            setYamlValidateStatus("error");
            setYamlValidateError(r.error || "Validation failed");
          }
        }, 500);
        return () => clearTimeout(timer);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [yamlText, viewMode]);

      // View toggle with sync + confirm-on-unparseable.
      const switchViewMode = (next) => {
        if (next === viewMode) return;
        if (viewMode === "yaml" && yamlParseError) {
          const ok = window.confirm(
            "The YAML editor has unsaved syntax errors. " +
            "Switching to Form view will discard those edits. Continue?"
          );
          if (!ok) return;
          // Revert yamlText to match current draft.
          setYamlText(serializeDraftToYaml(draft));
          setYamlParseError("");
        }
        setViewMode(next);
      };

      const triggerYamlValidateNow = async () => {
        const parsed = parseYamlText(yamlText);
        if (!parsed.ok) {
          setYamlParseError(parsed.err);
          setYamlValidateStatus("idle");
          return;
        }
        setYamlValidateStatus("validating");
        const r = await apiCall("/api/dashboard/config/validate", {
          method: "POST", body: { yaml: yamlText },
        });
        if (r.ok) {
          setYamlValidateStatus("ok");
          setYamlValidateError("");
        } else {
          setYamlValidateStatus("error");
          setYamlValidateError(r.error || "Validation failed");
        }
      };

      // Force restart flow:
      //   1. User confirms modal → POST /restart.
      //   2. Show "Waiting for server" with a countdown while we poll
      //      /api/dashboard/setup (unauthenticated — works even if our
      //      session cookie died in the restart).
      //   3. When setup responds, location.reload() to get a clean app
      //      state. If after 30s we still can't reach it, show "Still
      //      waiting" and let the user refresh manually.
      const runForceRestart = async () => {
        setRestartPhase("sending");
        const r = await apiCall("/api/dashboard/config/restart", { method: "POST" });
        if (!r.ok) {
          setRestartPhase("failed");
          return;
        }
        setRestartPhase("waiting");
        const startedAt = Date.now();
        const tick = async () => {
          const elapsed = Math.floor((Date.now() - startedAt) / 1000);
          setRestartCountdown(elapsed);
          if (elapsed > 30) { setRestartPhase("failed"); return; }
          try {
            const probe = await fetch(`${API_BASE}/api/dashboard/setup`, { cache: "no-store" });
            if (probe.ok) {
              setRestartPhase("reconnected");
              setTimeout(() => window.location.reload(), 600);
              return;
            }
          } catch {}
          setTimeout(tick, 1000);
        };
        // Give the process time to actually SIGTERM + KeepAlive-relaunch
        // before we start knocking. Starting immediately just piles 5-8
        // failed fetches into devtools for no reason.
        setTimeout(tick, 2000);
      };

      // Basic client-side validation run on Save click. Returns map of
      // fieldId → error message; empty map = valid. Intentionally narrow:
      // required + type checks only. Semantic validity (is this a real
      // model name?) belongs to the backend / runtime.
      const runClientValidation = () => {
        const errs = {};
        const d = draft || {};
        if (!d.llm?.provider) errs["llm.provider"] = "Required";
        if (!d.llm?.model) errs["llm.model"] = "Required";
        if (!d.embedding?.provider) errs["embedding.provider"] = "Required";
        if (!d.embedding?.model) errs["embedding.model"] = "Required";
        if (!d.classifier?.provider) errs["classifier.provider"] = "Required";
        if (!d.classifier?.model) errs["classifier.model"] = "Required";
        // Numeric fields: if present, must be a finite number.
        for (const [path, val] of [
          ["llm.temperature", d.llm?.temperature],
          ["llm.max_tokens", d.llm?.max_tokens],
          ["classifier.temperature", d.classifier?.temperature],
          ["embedding.dimensions", d.embedding?.dimensions],
          ["chat_interface.max_history_messages", d.chat_interface?.max_history_messages],
          ["chat_interface.max_message_length", d.chat_interface?.max_message_length],
          ["chat_interface.sse_keepalive_seconds", d.chat_interface?.sse_keepalive_seconds],
        ]) {
          if (val !== undefined && val !== "" && (typeof val !== "number" || !Number.isFinite(val))) {
            errs[path] = "Must be a number";
          }
        }
        return errs;
      };

      const handleSave = async () => {
        setServerError(""); setSaveMsg("");
        // In YAML view, a save with a broken buffer is a hard no —
        // we don't know what the user meant.
        if (viewMode === "yaml" && yamlParseError) {
          setServerError(`Fix YAML errors before saving: ${yamlParseError}`);
          return;
        }
        // Form-view-only client validation (required/numeric checks).
        // YAML view bypasses this because the YAML text can legitimately
        // drop sections or change the shape beyond what the form knows.
        if (viewMode === "form") {
          const errs = runClientValidation();
          setFieldErrors(errs);
          if (Object.keys(errs).length > 0) {
            setServerError("Some fields need attention — see highlighted entries below.");
            // Scroll the first offending field into view. Sections may be
            // collapsed or off-viewport; "see below" would otherwise lie.
            // scrollIntoView on a non-visible element is a silent no-op —
            // rare edge (no expanded section has a matching field) and not
            // worth extra logic to handle.
            setTimeout(() => {
              const firstId = Object.keys(errs)[0];
              const el = document.querySelector(`[data-field-id="${firstId}"]`);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 0);
            return;
          }
        }
        const payload = computeSavePayload(draft, loaded);
        if (Object.keys(payload).length === 0) return;
        setSaving(true);
        const r = await apiCall("/api/dashboard/config/save", { method: "POST", body: payload });
        if (r.ok) {
          setSaveMsg(`Saved. Backup: ${r.data.backup || "(none — first save)"}`);
          setTimeout(() => setSaveMsg(""), 4000);
          await reload();
          // After reload, re-serialize YAML so the editor reflects the
          // post-save state (e.g. backend reformatted or soft-reload
          // adjusted something). Harmless if user is in form view.
          setYamlText("");
          if (onSaved) onSaved();
        } else {
          setServerError(r.error || "Save failed");
        }
        setSaving(false);
      };

      const handleDiscard = () => {
        setDraft(cloneConfigForEdit(loaded));
        setYamlText("");  // force regeneration from loaded on next YAML entry
        setYamlParseError("");
        setYamlValidateStatus("idle");
        setYamlValidateError("");
        setFieldErrors({});
        setServerError("");
        setSaveMsg("");
      };

      // ── Render ─────────────────────────────────────────────
      if (loading) {
        return React.createElement(Tile, null,
          React.createElement(Skeleton, { className: "h-4 w-32 mb-3" }),
          React.createElement(Skeleton, { className: "h-32 w-full" })
        );
      }
      if (loadError) {
        return React.createElement(Tile, null,
          React.createElement("div", { className: "text-sm text-red-400" },
            `Failed to load configuration: ${loadError}`)
        );
      }

      const d = draft || {};

      // Field / TextInput / NumberInput / TextArea / SelectInput /
      // Checkbox / AccSection are hoisted to module scope — see the
      // block above RuntimeConfigEditor for why. They read themeName /
      // fieldErrors / expanded / toggle from RuntimeEditorCtx, which we
      // wrap the render in at the bottom.

      // ── Chat Interface ─────────────────────────────────────
      const ci = d.chat_interface || {};
      const chatInterfaceFields = React.createElement("div", null,
        React.createElement(Field, { id: "chat_interface.system_prompt", label: "System prompt",
          help: "Shown to the chat LLM on every conversation start." },
          React.createElement(TextArea, {
            value: ci.system_prompt, rows: 5,
            onChange: v => patch("chat_interface", { system_prompt: v }),
            placeholder: "You are Tailor, a personal AI assistant...",
          }),
        ),
        React.createElement("div", { className: "grid grid-cols-1 md:grid-cols-3 gap-3" },
          React.createElement(Field, { id: "chat_interface.max_history_messages", label: "Max history messages",
            help: "Turns of context retained per session." },
            React.createElement(NumberInput, {
              id: "chat_interface.max_history_messages", value: ci.max_history_messages,
              onChange: v => patch("chat_interface", { max_history_messages: v }),
              min: 1, step: 1,
            }),
          ),
          React.createElement(Field, { id: "chat_interface.max_message_length", label: "Max message length",
            help: "Characters per user input." },
            React.createElement(NumberInput, {
              id: "chat_interface.max_message_length", value: ci.max_message_length,
              onChange: v => patch("chat_interface", { max_message_length: v }),
              min: 1, step: 1,
            }),
          ),
          React.createElement(Field, { id: "chat_interface.sse_keepalive_seconds", label: "SSE keep-alive (s)",
            help: "Heartbeat interval for streaming." },
            React.createElement(NumberInput, {
              id: "chat_interface.sse_keepalive_seconds", value: ci.sse_keepalive_seconds,
              onChange: v => patch("chat_interface", { sse_keepalive_seconds: v }),
              min: 1, step: 1,
            }),
          ),
        ),
        React.createElement(Field, { label: "Suggested prompts", help: "One per line. Rendered as buttons on an empty chat." },
          React.createElement(TextArea, {
            value: (ci.suggest_prompts || []).join("\n"), rows: 4,
            onChange: v => patch("chat_interface", {
              suggest_prompts: v.split("\n").map(s => s.trim()).filter(Boolean),
            }),
            placeholder: "What did I do yesterday?\nSummarize this week's decisions",
          }),
        ),
        // Available providers table (provider + model + label per row).
        // Model is a dynamic dropdown populated from /api/chat/models for the
        // selected provider. If the fetch fails or returns no entries (e.g.
        // missing API key, ollama — which is not served by the endpoint),
        // we fall back to a free-text input so the user can still enter a
        // model ID manually. Label auto-fills with the picked model's
        // display_name when it's blank or still matches a prior auto-value.
        React.createElement("div", { className: "mb-2" },
          React.createElement("div", { className: cl("text-sm font-medium mb-2", t.textLabel) }, "Available providers in chat"),
          React.createElement("div", { className: cl("text-xs mb-2", t.textFaint) },
            "Shown in the per-session provider dropdown. Each row needs a provider and model."),
          React.createElement("div", { className: "space-y-2" },
            (ci.available_providers || []).map((row, idx) => {
              const provider = row.provider || "";
              const catalog = provider ? modelCatalog[provider] : null;
              const isDynamic = DYNAMIC_MODEL_PROVIDERS.has(provider);
              const isLoading = isDynamic && catalog && catalog.status === "loading";
              const hasModels = isDynamic && catalog && catalog.status === "ok" && (catalog.models || []).length > 0;
              const errorMsg = isDynamic && catalog && catalog.status === "error" ? catalog.error : "";

              const updateRow = (patchObj) => {
                const arr = [...(ci.available_providers || [])];
                arr[idx] = { ...arr[idx], ...patchObj };
                patch("chat_interface", { available_providers: arr });
              };

              const onPickModel = (newModel) => {
                const match = hasModels ? catalog.models.find(m => m.id === newModel) : null;
                const newDisplay = match ? match.display_name : newModel;
                const prevMatch = hasModels ? catalog.models.find(m => m.id === row.model) : null;
                const prevDisplay = prevMatch ? prevMatch.display_name : "";
                // Auto-suggest label only when Label is empty or still equals
                // the previously-auto-suggested value. Anything else means the
                // user typed something custom — never overwrite.
                const currentLabel = row.label || "";
                const canAutoLabel = !currentLabel || currentLabel === prevDisplay;
                const next = { model: newModel };
                if (canAutoLabel && newDisplay) next.label = newDisplay;
                updateRow(next);
              };

              const modelControl = hasModels
                ? React.createElement("select", {
                    value: row.model || "",
                    onChange: (e) => onPickModel(e.target.value),
                    className: cl("flex-1 px-2 py-1.5 rounded-lg border text-sm font-mono", t.input),
                  },
                    React.createElement("option", { value: "" }, "Select model..."),
                    // Keep a row.model that's no longer in the live catalog visible
                    // instead of silently blanking a saved-but-deprecated value.
                    row.model && !catalog.models.some(m => m.id === row.model)
                      ? React.createElement("option", { key: "__current", value: row.model }, row.model + " (not in catalog)")
                      : null,
                    catalog.models.map(m =>
                      React.createElement("option", { key: m.id, value: m.id }, m.display_name + " — " + m.id),
                    ),
                  )
                : isLoading
                ? React.createElement("select", {
                    value: "", disabled: true,
                    className: cl("flex-1 px-2 py-1.5 rounded-lg border text-sm font-mono", t.input),
                  },
                    React.createElement("option", { value: "" }, "Loading models..."),
                  )
                : React.createElement("input", {
                    type: "text", value: row.model || "",
                    placeholder: "model name",
                    onChange: (e) => updateRow({ model: e.target.value }),
                    className: cl("flex-1 px-2 py-1.5 rounded-lg border text-sm font-mono", t.input),
                  });

              return React.createElement("div", { key: idx, className: "space-y-1" },
                React.createElement("div", { className: cl("flex items-center gap-2 p-2 rounded-xl border", t.borderLight, mode === "dark" ? "bg-zinc-900/40" : "bg-zinc-50") },
                  React.createElement("select", {
                    value: provider,

    function SecretsPage() {
      const t = useTheme();
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [secrets, setSecrets] = useState([]);
      const [masterKeyExists, setMasterKeyExists] = useState(null);
      const [modal, setModal] = useState(null); // { type, provider, current? }
      const [verifyStatus, setVerifyStatus] = useState({});
      const [toast, setToast] = useState(null);
      const [importOpen, setImportOpen] = useState(false);
      // Bumped whenever we mutate the DB — BackupsPanel reloads its list.
      const [backupsRefreshKey, setBackupsRefreshKey] = useState(0);
      const bumpBackups = () => setBackupsRefreshKey(k => k + 1);

      const refresh = useCallback(async () => {
        setError("");
        const r = await apiCall("/api/secrets/list");
        if (!r.ok) {
          setError(r.error || "Failed to load secrets");
          setLoading(false);
          return;
        }
        setSecrets(r.data.secrets || []);
        setMasterKeyExists(!!r.data.master_key_exists);
        setLoading(false);
      }, []);

      useEffect(() => { refresh(); }, [refresh]);

      // Auto-clear verify status chips after 15s.
      useEffect(() => {
        const entries = Object.entries(verifyStatus);
        if (!entries.length) return;
        const settled = entries.filter(([, s]) => s.state === "ok" || s.state === "fail");
        if (!settled.length) return;
        const h = setTimeout(() => {
          setVerifyStatus(vs => {
            const next = { ...vs };
            for (const [p, s] of settled) if (next[p] === s) delete next[p];
            return next;
          });
        }, 15000);
        return () => clearTimeout(h);
      }, [verifyStatus]);

      const entryFor = (pid) => secrets.find(s => s.provider === pid) || null;

      const handleVerify = async (provider) => {
        setVerifyStatus(vs => ({ ...vs, [provider]: { state: "verifying" } }));
        const r = await apiCall("/api/secrets/verify", {
          method: "POST", body: { provider },
        });
        if (!r.ok) {
          setVerifyStatus(vs => ({ ...vs, [provider]: { state: "fail", message: r.error } }));
          return;
        }
        if (r.data.verified) {
          setVerifyStatus(vs => ({ ...vs, [provider]: { state: "ok", latency_ms: r.data.latency_ms } }));
        } else {
          setVerifyStatus(vs => ({ ...vs, [provider]: { state: "fail", message: r.data.error || "Verification failed" } }));
        }
      };

      const closeModal = () => setModal(null);

      const handleSaveSuccess = ({ provider, isRotate, backup }) => {
        closeModal();
        refresh();
        bumpBackups();
        if (isRotate && backup) {
          const label = SECRET_PROVIDERS.find(p => p.id === provider)?.label || provider;
          setToast({
            title: `${label} key rotated successfully`,
            undoLabel: "Restore previous key",
            backup,
            provider,
          });
        }
      };

      const handleDeleteSuccess = () => { closeModal(); refresh(); bumpBackups(); };

      // Loading skeleton
      if (loading || masterKeyExists === null) {
        return React.createElement("div", { className: "space-y-5" },
          React.createElement(Skeleton, { className: "h-6 w-48" }),
          React.createElement(Skeleton, { className: "h-24 w-full" }),
          React.createElement(Skeleton, { className: "h-24 w-full" })
        );
      }

      // Setup required
      if (masterKeyExists === false) {
        return React.createElement("div", { className: "space-y-5" },
          React.createElement("div", null,
            React.createElement("h2", { className: cl("text-lg font-semibold", t.text) }, "API Keys"),
            React.createElement("p", { className: cl("text-sm mt-1", t.textFaint) }, "Encrypted credentials for your LLM providers")
          ),
          error && React.createElement("div", { className: "text-sm text-red-400 p-3 rounded-xl border border-red-500/30 bg-red-500/5" }, error),
          React.createElement(MasterKeySetupCard, { onGenerated: refresh })
        );
      }

      // Main UI
      const headerRight = React.createElement("div", { className: "flex items-center gap-3 flex-wrap" },
        React.createElement("button", {
          onClick: () => setImportOpen(true),
          className: cl("px-3 py-1.5 rounded-lg text-sm font-medium transition-all border",
            t.border, t.textMuted, "hover:text-teal-400 hover:border-teal-500"),
        }, "Import from .env")
      );

      return React.createElement("div", { className: "space-y-5" },
        React.createElement("div", { className: "flex items-start justify-between gap-4 flex-wrap" },
          React.createElement("div", null,
            React.createElement("h2", { className: cl("text-lg font-semibold", t.text) }, "API Keys"),
            React.createElement("p", { className: cl("text-sm mt-1", t.textFaint) }, "Encrypted credentials for your LLM providers")
          ),
          headerRight
        ),
        error && React.createElement("div", { className: "flex items-center justify-between gap-3 text-sm text-red-400 p-3 rounded-xl border border-red-500/30 bg-red-500/5" },
          React.createElement("span", null, error),
          React.createElement("button", {
            onClick: refresh,
            className: "text-sm font-medium px-3 py-1 rounded-lg border border-red-500/30 hover:bg-red-500/10",
          }, "Retry")

        React.createElement(MasterKeyCard, {
          onToast: (payload) => setToast(payload),
          onReplaced: () => {
            // Imported key = existing rows are now unreadable; surface the
            // state change but don't hide the panel — the user needs to

            bumpBackups();
            refresh();
          },
        }),
        React.createElement("div", { className: "space-y-3" },
          SECRET_PROVIDERS.map(p => React.createElement(ProviderCard, {
            key: p.id,
            provider: p.id,
            label: p.label,
            entry: entryFor(p.id),
            verifyStatus: verifyStatus[p.id],
            onAdd: (id) => setModal({ type: "add", provider: id }),
            onRotate: (id) => setModal({ type: "rotate", provider: id, current: entryFor(id) }),
            onDelete: (id) => setModal({ type: "delete", provider: id, current: entryFor(id) }),
            onVerify: handleVerify,
          }))
        ),
        modal && (modal.type === "add" || modal.type === "rotate") && React.createElement(KeyModal, {
          provider: modal.provider,
          current: modal.type === "rotate" ? modal.current : null,
          onClose: closeModal,
          onSubmit: handleSaveSuccess,
        }),
        modal && modal.type === "delete" && React.createElement(DeleteModal, {
          provider: modal.provider,
          last4: modal.current?.last4,
          onClose: closeModal,
          onConfirm: handleDeleteSuccess,
        }),
        importOpen && React.createElement(ImportEnvModal, {
          onClose: () => setImportOpen(false),
          onApplied: () => { refresh(); bumpBackups(); },
        }),
        React.createElement(BackupsPanel, {
          refreshKey: backupsRefreshKey,
          onRestored: () => { refresh(); setToast({ title: "Backup restored" }); },
          onToast: (payload) => setToast(payload),
        }),
        React.createElement(Toast, {
          toast,
          onDismiss: () => setToast(null),
          onUndo: () => {
            // Placeholder: backup restore UI lands in commit 7.
            // Keep the toast open; the button carries a tooltip explaining.
          },
        })
      );
    }

    // ── App ──
    function LoginScreen({ onLogin, mode }) {
      const [token, setToken] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const t = themes[mode];

      const handleLogin = async () => {
        setLoading(true);
        setError("");
        try {
          const r = await fetch(`${API_BASE}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ token }),
          });
          const data = await r.json();
          if (data.ok) {
            onLogin();
          } else {
            setError("Invalid access token");
          }
        } catch (e) {
          setError("Connection failed");
        }
        setLoading(false);
      };

      return React.createElement("div", {
        className: "min-h-screen flex items-center justify-center",
        style: { background: "linear-gradient(135deg, #050608 0%, #070a0f 50%, #050608 100%)", fontFamily: "'Outfit', sans-serif" }
      },
        React.createElement("div", { className: "w-full max-w-sm mx-4 fade-in" },
          React.createElement("div", { className: "text-center mb-8" },
            React.createElement("h1", { className: cl("text-3xl font-bold mb-1", t.text), style: { letterSpacing: "1px" } },
              React.createElement("span", null, "T"),
              React.createElement("span", { style: { color: "#0d9488", fontWeight: 400, fontSize: "36px", position: "relative", top: "-2px" } }, "["),
              React.createElement("span", { style: { color: "#0d9488" } }, "AI"),
              React.createElement("span", { style: { color: "#0d9488", fontWeight: 400, fontSize: "36px", position: "relative", top: "-2px", marginRight: "-2px" } }, "]"),
              React.createElement("span", null, "LOR")
            ),
            React.createElement("p", { className: cl("text-sm tracking-widest mt-1", t.textFaint) }, "Self-hosted AI memory that never forgets")
          ),
          React.createElement("div", { className: cl("rounded-2xl border p-6", t.tile) },
            React.createElement("label", { className: cl("text-sm font-medium block mb-2", t.textLabel) }, "Access Token"),
            React.createElement("input", {
              type: "password",
              value: token,
              onChange: (e) => setToken(e.target.value),
              onKeyDown: (e) => e.key === "Enter" && handleLogin(),
              placeholder: "Enter your access token",
              className: cl("w-full px-4 py-3 rounded-xl border text-sm font-mono outline-none transition-all",
                "focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500", t.input
              ),
              autoFocus: true,
            }),
            error && React.createElement("p", { className: "text-sm text-red-400 mt-2" }, error),
            React.createElement("button", {
              onClick: handleLogin,
              disabled: loading || !token,
              className: cl("w-full mt-4 py-3 rounded-xl text-sm font-semibold transition-all",
                "bg-teal-600 hover:bg-teal-500 text-white",
                (loading || !token) && "opacity-50 cursor-not-allowed"
              ),
            }, loading ? "Verifying..." : "Sign In")
          )
        )
      );
    }

    function App() {
      const [setupDone, setSetupDone] = useState(null);
      const [authed, setAuthed] = useState(null);
      const [tab, setTab] = useState("home");
      const [mode, setMode] = useState(localStorage.getItem("tailor-theme") || "dark");
      const [time, setTime] = useState(new Date());
      const [stats, setStats] = useState(null);
      const [services, setServices] = useState(null);
      const [config, setConfig] = useState(null);
      const [profile, setProfile] = useState(null);
      const [pipeline, setPipeline] = useState(null);
      const [modelAdvisor, setModelAdvisor] = useState(null);
      // Config editor dirty bit, bubbled up so tab switches can warn.
      const [configDirty, setConfigDirty] = useState(false);

      // Tab switch interceptor: if the config editor has unsaved work and
      // the user clicks a different tab, confirm first. Confirming treats
      // the edits as discarded (the editor will re-read /current on remount).
      const requestTabChange = (next) => {
        if (next === tab) return;
        if (tab === "config" && configDirty) {
          const ok = window.confirm(
            "You have unsaved configuration changes.\n" +
            "Switching tabs will discard them. Continue?"
          );
          if (!ok) return;
          setConfigDirty(false);
        }
        setTab(next);
      };

      const toggleMode = () => {
        const next = mode === "dark" ? "light" : "dark";
        setMode(next);
        localStorage.setItem("tailor-theme", next);
      };

      // Check setup + auth on load
      useEffect(() => {
        async function checkSetupAndAuth() {
          try {
            const sr = await fetch(`${API_BASE}/api/dashboard/setup`);
            const sd = await sr.json();
            if (!sd.setup_complete) {
              setSetupDone(false);
              return;
            }
          } catch { /* assume setup done if check fails */ }
          setSetupDone(true);
          const r = await apiFetch("bulk");
          if (r) {
            setAuthed(true);
            if (r.stats) setStats(r.stats);
            if (r.services) setServices(r.services);
            if (r.config) setConfig(r.config);
            if (r.profile) setProfile(r.profile);
            if (r.pipeline) setPipeline(r.pipeline);
            if (r.model_advisor) setModelAdvisor(r.model_advisor);
          } else {
            setAuthed(false);
          }
        }
        checkSetupAndAuth();
      }, []);

      const refresh = useCallback(async () => {
        window.__tailorUnauth = false;
        const bulk = await apiFetch("bulk");
        if (window.__tailorUnauth) { setAuthed(false); return; }
        if (bulk) {
          if (bulk.stats) setStats(bulk.stats);
          if (bulk.services) setServices(bulk.services);
          if (bulk.config) setConfig(bulk.config);
          if (bulk.profile) setProfile(bulk.profile);
          if (bulk.pipeline) setPipeline(bulk.pipeline);
          if (bulk.model_advisor) setModelAdvisor(bulk.model_advisor);
        }
      }, []);

      useEffect(() => { if (authed) refresh(); }, [authed, refresh]);
      useEffect(() => { const i = setInterval(() => { if (authed) refresh(); }, 30000); return () => clearInterval(i); }, [authed, refresh]);
      useEffect(() => { const i = setInterval(() => setTime(new Date()), 30000); return () => clearInterval(i); }, []);

      // Loading
      if (setupDone === null) return React.createElement("div", { className: "min-h-screen flex items-center justify-center", style: { background: themes[mode].bg } },
        React.createElement("div", { className: themes[mode].skeleton + " w-8 h-8 rounded-full" })
      );
      // Wizard
      if (setupDone === false) return React.createElement(SetupWizard, { onComplete: () => { setSetupDone(true); window.location.reload(); }, mode });
      // Auth loading
      if (authed === null) return React.createElement("div", { className: "min-h-screen flex items-center justify-center", style: { background: themes[mode].bg } },
        React.createElement("div", { className: themes[mode].skeleton + " w-8 h-8 rounded-full" })
      );
      // Login
      if (authed === false) return React.createElement(LoginScreen, { onLogin: () => { setAuthed(true); }, mode });

      const t = themes[mode];
      const allRunning = services?.every(s => s.status === "running");

      const pages = {
        home: React.createElement(HomePage, { stats, services, setTab, modelAdvisor }),
        chat: window.TailorChat
          ? React.createElement(window.TailorChat.Tab, { theme: t })
          : React.createElement("div", { className: cl("rounded-2xl border p-8 text-center", t.border, t.tile) },
              React.createElement("div", { className: cl("text-sm", t.textMuted) }, "Chat component failed to load. Check /dashboard/chat.jsx.")
            ),
        kb: React.createElement(KBPage, { stats, config }),
        pipeline: React.createElement(PipelinePage, { pipeline }),
        config: React.createElement(ConfigPage, { config, onConfigSaved: refresh, onDirtyChange: setConfigDirty }),
        secrets: React.createElement(SecretsPage, null),
        profile: React.createElement(ProfilePage, { profile }),
      };

      return React.createElement(ThemeContext.Provider, { value: t },
        React.createElement("div", { className: "min-h-screen", style: { background: t.bg, fontFamily: "'Outfit', sans-serif" } },
          // Header
          React.createElement("header", { className: "sticky top-0 z-50 frosted-nav", style: { background: t.headerBg } },
            React.createElement("div", { className: cl("max-w-6xl mx-auto px-5 h-16 flex items-center justify-between border-b", t.border) },
              React.createElement("div", { className: "flex items-center gap-3" },
                React.createElement("div", { className: "flex items-center", style: { gap: "0px" } },
                  React.createElement("span", { className: cl(t.text), style: { fontSize: "22px", fontWeight: 700, lineHeight: 1, letterSpacing: "1px" } }, "T"),
                  React.createElement("span", { style: { color: "#0d9488", fontSize: "25px", fontWeight: 400, lineHeight: 1, position: "relative", top: "-1px" } }, "["),
                  React.createElement("span", { style: { color: "#0d9488", fontSize: "22px", fontWeight: 700, lineHeight: 1, letterSpacing: "1px" } }, "AI"),
                  React.createElement("span", { style: { color: "#0d9488", fontSize: "25px", fontWeight: 400, lineHeight: 1, position: "relative", top: "-1px", marginRight: "-1px" } }, "]"),
                  React.createElement("span", { className: cl(t.text), style: { fontSize: "22px", fontWeight: 700, lineHeight: 1, letterSpacing: "1px" } }, "LOR")
                ),
                React.createElement("span", { className: cl("text-xs hidden sm:inline tracking-widest", t.textMuted) }, "Self-hosted AI memory that never forgets")
              ),
              React.createElement("div", { className: "flex items-center gap-4" },
                React.createElement("span", { className: cl("text-sm font-mono hidden sm:inline", t.textFaint) },
                  `${time.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })} \u00B7 ${time.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}`
                ),
                React.createElement("div", { className: "flex items-center gap-2" },
                  React.createElement("span", { className: cl("w-2 h-2 rounded-full", allRunning === false ? "bg-amber-400" : "bg-emerald-400", "shadow-[0_0_12px_rgba(52,211,153,0.6)] glow-pulse") }),
                  React.createElement("span", { className: cl("text-sm font-medium", allRunning === false ? "text-amber-400" : t.statusOnline) },
                    allRunning === false ? "DEGRADED" : services ? "ONLINE" : "...")
                ),
                React.createElement("button", { onClick: toggleMode, className: cl("w-10 h-10 rounded-xl flex items-center justify-center text-base transition-all", mode === "dark" ? "bg-zinc-800 hover:bg-zinc-700" : "bg-zinc-100 hover:bg-zinc-200") },
                  mode === "dark" ? "\u2600\uFE0F" : "\u{1F319}"
                ),
                React.createElement("button", { onClick: refresh, className: cl("w-10 h-10 rounded-xl flex items-center justify-center text-base transition-all", mode === "dark" ? "bg-zinc-800 hover:bg-zinc-700" : "bg-zinc-100 hover:bg-zinc-200"), title: "Refresh" },
                  "\u{1F504}"
                )
              )
            )
          ),
          // Nav
          React.createElement("nav", { className: cl("border-b", t.border) },
            React.createElement("div", { className: "max-w-6xl mx-auto px-5 flex gap-1 overflow-x-auto py-1" },
              TABS.map(tb => React.createElement("button", {
                key: tb.id, onClick: () => requestTabChange(tb.id),
                className: cl("px-4 py-2.5 text-sm font-semibold tracking-wider rounded-xl transition-all whitespace-nowrap", tab === tb.id ? t.navActive : t.navInactive)
              }, React.createElement("span", { className: "mr-1.5 text-sm" }, tb.icon), tb.label))
            )
          ),
          // Content
          React.createElement("main", { className: "max-w-6xl mx-auto px-5 py-6" }, pages[tab]),
          // Footer
          React.createElement("footer", { className: cl("border-t mt-12 footer-teal", t.border) },
            React.createElement("div", { className: "max-w-6xl mx-auto px-5 py-4 flex items-center justify-between" },
              React.createElement("span", { className: cl("text-sm", t.footerText) }, "T[AI]LOR \u2014 Self-hosted AI memory that never forgets"),
              React.createElement("span", { className: cl("text-sm font-mono", t.footerText) }, window.location.host)
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
