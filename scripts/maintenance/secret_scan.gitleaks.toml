# Config for nightly secret_scan (~/tailor/scripts/maintenance/secret_scan.sh).
# Extends gitleaks default rule set; allowlists paths che generano FP o sono
# fuori scope (vendored, runtime DB/data, archived, log/test/doc fixtures).
# Misura 1 post-incident 4 maggio 2026.

[extend]
useDefault = true

[allowlist]
description = "TAILOR working-tree scan — skip vendored, runtime, archived, log/test/doc paths"
paths = [
  # Vendored / runtime caches
  '''(^|/)\.venv/''',
  '''(^|/)\.git/''',
  '''(^|/)node_modules/''',
  '''(^|/)__pycache__/''',
  '''(^|/)\.pytest_cache/''',
  '''(^|/)\.mypy_cache/''',
  '''(^|/)\.ruff_cache/''',
  # Data / artifacts / DB
  '''(^|/)models/''',
  '''(^|/)db/''',
  '''(^|/)data/''',
  '''(^|/)backups/''',
  '''(^|/)\.backups/''',
  '''(^|/)archive/''',
  # OAuth credentials (gitignored; client_id/secret/refresh_token are legitimate,
  # not source-code secrets. Verified .gitignore via git check-ignore.)
  '''(^|/)credentials/''',
  # Repo conventions
  '''(^|/)\.claude/''',
  # Log files: high-FP zone per generic-api-key (session strings, base64 IDs).
  # Coverage gap noto; logs sono già rotated e non sono il vettore dell'incident.
  '''(^|/)logs/''',
  # Tests intenzionalmente contengono finti secrets (test_secrets_*, test_log_redaction)
  '''(^|/)tests/''',
  # Docs sono pubblici / contengono esempi
  '''(^|/)docs/''',
]
