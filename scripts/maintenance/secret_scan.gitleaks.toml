# Config for nightly secret_scan (~/tailor/scripts/maintenance/secret_scan.sh).
# Extends gitleaks default rule set; allowlists paths che generano FP o sono
# fuori scope (vendored, runtime DB/data, archived, test/doc fixtures).
# Misura 1 post-incident 4 maggio 2026.
#
# Revisione 16 luglio 2026 — post-incident bot token nei log. Lo scanner ha
# riportato "clean (0 findings)" per giorni mentre logs/telegram_v5_stderr.log
# conteneva il token VIVO in 2.801 righe. Due cause indipendenti, entrambe qui:
#
#   1. `logs/` era escluso IN BLOCCO dal solo rumore di generic-api-key.
#      Misurato: su 46,8 MB di logs/ i finding erano 61, TUTTI generic-api-key,
#      TUTTI in tunnel_stderr.log. Nessun'altra regola sparava. Escludere
#      l'intera directory per una sola regola rumorosa ha spento anche tutte le
#      regole a forma netta -> ora l'esclusione è mirata (targetRules).
#
#   2. Anche senza l'esclusione, la regola DEFAULT `telegram-bot-api-token` NON
#      vedeva il leak: non matcha il token dentro l'URL. Verificato su 8.30.1:
#         "telegram token: <TOK>"                        -> TROVATO
#         "https://api.telegram.org/bot<TOK>/sendMessage" -> NON trovato
#      cioè proprio e solo la forma in cui il token leakka davvero (requests
#      incorpora l'URL nelle eccezioni). Da qui la regola custom in fondo.
#
# Sanare solo la (1) avrebbe lasciato lo scanner cieco lo stesso.

[extend]
useDefault = true

# ── Allowlist globale: path fuori scope per QUALUNQUE regola ────────────────
# `[[allowlists]]` (plurale) invece di `[allowlist]`: la forma plurale è
# l'unica che accetta `targetRules`, usato nel blocco successivo.
[[allowlists]]
description = "TAILOR working-tree scan — skip vendored, runtime, archived, test/doc paths"
paths = [
  # Vendored / runtime caches
  '''(^|/)\.venv/''',
  '''(^|/)\.git/''',
  '''(^|/)node_modules/''',
  '''(^|/)__pycache__/''',
  '''(^|/)\.pytest_cache/''',
  '''(^|/)\.mypy_cache/''',
  '''(^|/)\.ruff_cache/''',
  # Data / artifacts / DB
  '''(^|/)models/''',
  '''(^|/)db/''',
  '''(^|/)data/''',
  '''(^|/)backups/''',
  '''(^|/)\.backups/''',
  '''(^|/)archive/''',
  # OAuth credentials (gitignored; client_id/secret/refresh_token are legitimate,
  # not source-code secrets. Verified .gitignore via git check-ignore.)
  '''(^|/)credentials/''',
  # Repo conventions
  '''(^|/)\.claude/''',
  # Tests intenzionalmente contengono finti secrets (test_secrets_*,
  # test_log_redaction, test_telegram_notify). NOTA: questo copre anche le
  # regole custom -> un token VERO committato sotto tests/ resterebbe invisibile.
  # Tradeoff preesistente, non introdotto qui.
  '''(^|/)tests/''',
  # Docs sono pubblici / contengono esempi
  '''(^|/)docs/''',
]

# ── logs/: sopprimi SOLO la regola rumorosa, non la directory ───────────────
# `targetRules` limita questa esclusione a generic-api-key. Tutte le altre
# regole — incluse quelle a forma netta e la custom qui sotto — scansionano
# logs/ normalmente. È la differenza fra "il guardiano non guarda lì" e "il
# guardiano ignora un rumore specifico".
# Misura: 61/61 dei FP su logs/ sono generic-api-key (session strings, base64
# IDs in tunnel_stderr.log). Rimisurare se il rumore cambia natura.
[[allowlists]]
description = "logs/: solo generic-api-key è rumorosa qui — le forme nette restano attive"
targetRules = ["generic-api-key"]
paths = ['''(^|/)logs/''']

# ── Regole custom ───────────────────────────────────────────────────────────

# La default `telegram-bot-api-token` richiede che il token sia delimitato da
# non-word char, quindi NON matcha `/bot<TOKEN>/sendMessage`: fra la "t" di
# "bot" e la prima cifra non c'è confine di parola. Ma l'URL è l'unico posto
# dove il token finisce nei log (requests lo incorpora nelle eccezioni), quindi
# la regola default è cieca esattamente sul caso reale.
#
# Qui nessun contesto richiesto a sinistra: la forma `<8-10 cifre>:A<34 char>`
# è già specifica. Il boundary a destra `(?:$|[^A-Za-z0-9_-])` evita di matchare
# un prefisso di stringhe più lunghe. Niente `keywords`: la regola gira sempre,
# così un token trovato senza la parola "telegram" vicino non sfugge.
# Go/RE2 non ha lookahead: il boundary è un gruppo consumato, da cui secretGroup.
#
# FP misurati sul working tree (46,8 MB di logs + sorgenti): 0.
[[rules]]
id = "tailor-telegram-bot-token"
description = "Telegram bot token, anche dentro l'URL api.telegram.org/bot<TOKEN>/"
regex = '''([0-9]{8,10}:A[A-Za-z0-9_-]{34})(?:$|[^A-Za-z0-9_-])'''
secretGroup = 1
